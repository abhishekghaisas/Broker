services:
  - type: web
    name: broker-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: VERCEL_FRONTEND_URL
        sync: false
      # Supabase Postgres connection string, set manually in the Render dashboard.
      # When present, db.py uses PostgreSQL; if unset (e.g. local dev) it falls
      # back to SQLite. Use the Supabase connection POOLER URI (Supavisor, port
      # 6543) so it works over IPv4 from Render.
      - key: DATABASE_URL
        sync: false
