databases:
  - name: broker-db
    plan: free

services:
  - type: web
    name: broker-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: VERCEL_FRONTEND_URL
        sync: false
      # Wires the managed Postgres connection string into the app. When present,
      # db.py uses PostgreSQL; if unset (e.g. local dev), it falls back to SQLite.
      - key: DATABASE_URL
        fromDatabase:
          name: broker-db
          property: connectionString
